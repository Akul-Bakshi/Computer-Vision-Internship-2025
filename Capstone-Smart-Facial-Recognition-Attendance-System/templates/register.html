<!DOCTYPE html>
<html>
<head>
    <title>Register New Person</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f5f5f5;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .navbar {
            background-color: #001f4d; /* Dark blue */
            padding: 10px 20px;
            color: white;
            display: flex;
            align-items: center;
            width: 100%;
            box-sizing: border-box;
        }

        .navbar img {
            height: 40px;
            margin-right: 15px;
        }

        .main-content {
            padding: 20px;
            max-width: 700px;
            width: 100%;
            text-align: center;
        }

        .video-container {
            margin-top: 20px;
            border: 2px solid #001f4d;
            border-radius: 8px;
            display: inline-block;
            padding: 5px;
            background-color: white;
        }

        .input-container {
            margin-top: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        input[type="text"] {
            padding: 10px 15px;
            font-size: 18px;
            width: 250px;
            border: 2px solid #001f4d;
            border-radius: 6px;
            outline: none;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            border-color: #007bff;
        }

        button {
            padding: 10px 25px;
            font-size: 18px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <img src="/static/logo.png" alt="Logo">
        <h1 style="margin: 0; font-size: 20px;">Register New Person</h1>
    </div>

    <div class="main-content">
        <div class="video-container">
            <img src="{{ url_for('register_video_feed') }}" width="640" height="480" alt="Video feed">
        </div>

        <div class="input-container">
            <form action="{{ url_for('save_face') }}" method="POST">
                <input type="text" name="name" placeholder="Enter name" required>
                <button type="submit">Capture & Save</button>
            </form>
        </div>
    </div>
</body>
</html>
