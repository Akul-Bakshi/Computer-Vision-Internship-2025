<!DOCTYPE html>
<html>
<head>
    <title>Face Attendance Dashboard</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .navbar {
            background-color: #001f4d;
            padding: 10px 20px;
            color: white;
            display: flex;
            align-items: center;
            width: 100%;
        }

        .navbar img {
            height: 40px;
            margin-right: 15px;
        }

        .main-content {
            padding: 20px;
            max-width: 700px;
            width: 100%;
            text-align: center;
        }

        .video-feed {
            border: 2px solid #001f4d;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .attendance-list {
            margin-top: 20px;
            text-align: left;
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 0 8px rgba(0,0,0,0.1);
        }

        .attendance-list ul {
            list-style-type: none;
            padding: 0;
            max-height: 200px;
            overflow-y: auto;
            margin: 0;
        }

        .attendance-list li {
            font-size: 18px;
            margin: 6px 0;
            display: flex;
            align-items: center;
        }

        .attendance-list li.present label {
            text-decoration: line-through;
            color: gray;
        }

        .attendance-list input[type="checkbox"] {
            margin-right: 10px;
        }

        .button-container {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        button {
            padding: 14px 30px;
            font-size: 18px;
            border-radius: 6px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: background-color 0.3s ease, color 0.3s ease;
            font-weight: 600;
        }

        #start-attendance-btn {
            background-color: #001f4d;
            color: white;
            border-color: #001f4d;
        }

        #start-attendance-btn:hover {
            background-color: #003366;
            border-color: #003366;
        }

        #register-btn {
            background-color: white;
            color: #001f4d;
            border: 2px solid #001f4d;
        }

        #register-btn:hover {
            background-color: #e6e6e6;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <img src="/static/logo.png" alt="Logo">
        <h1 style="margin: 0; font-size: 20px;">Face Recognition Attendance System</h1>
    </div>
    <div class="main-content">
        <h2>Live Attendance Feed</h2>
        <img id="video-feed" class="video-feed" src="{{ video_feed_url }}" width="640" height="480" alt="Live Attendance Feed">
        
        <div class="attendance-list">
            <h3>Today's Attendance</h3>
            <ul id="attendance-names">
                {% for person in attendance_list %}
                    {% if person.present %}
                        <li class="present">
                            <input type="checkbox" checked disabled>
                            <label>{{ person.name }}</label>
                        </li>
                    {% else %}
                        <li>
                            <input type="checkbox" disabled>
                            <label>{{ person.name }}</label>
                        </li>
                    {% endif %}
                {% else %}
                    <li>No registered users found.</li>
                {% endfor %}
            </ul>
        </div>

        <div class="button-container">
            <button id="register-btn" onclick="window.location.href='/register'">Register New Person</button>
            <button id="start-attendance-btn" onclick="startAttendance()">Start Attendance</button>
        </div>
    </div>

    <script>
    async function startAttendance() {
        try {
            const response = await fetch('/start_attendance', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' }
            });
            const result = await response.json();
            console.log(result.message);

            const btn = document.getElementById('start-attendance-btn');
            btn.disabled = true;
            btn.innerText = 'Attendance Started';

            updateAttendanceList();
            const pollingInterval = setInterval(updateAttendanceList, 5000);

            setTimeout(() => {
                clearInterval(pollingInterval);
                btn.innerText = 'Attendance Complete';
                updateAttendanceList(); 
            }, 10000);

        } catch (error) {
            console.error('Error starting attendance:', error);
        }
    }

    async function updateAttendanceList() {
        try {
            const res = await fetch('/get_attendance');
            const attendanceList = await res.json();

            const ul = document.getElementById('attendance-names');
            const liList = ul.getElementsByTagName('li');

            attendanceList.forEach(person => {
                for (const li of liList) {
                    const label = li.querySelector('label');
                    if (label && label.textContent.trim().toLowerCase() === person.name.trim().toLowerCase()) {
                        console.log('Updating attendance for:', person.name);
                        const checkbox = li.querySelector('input[type="checkbox"]');
                        if (person.present) {
                            checkbox.checked = true;
                            li.classList.add('present');
                        } else {
                            checkbox.checked = false;
                            li.classList.remove('present');
                        }
                        break;
                    }
                }
            });
        } catch (e) {
            console.error('Failed to update attendance list:', e);
        }
    }
    </script>
</body>
</html>
